<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" fill="none">
  <rect width="520" height="360" fill="#1a1a2e"/>
  <text x="260" y="22" fill="#a5b4fc" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Tangent at P(t), point Q on tangent, chord AB to circle x² + y² = 4</text>
  <circle cx="260" cy="190" r="70" stroke="#60a5fa" stroke-width="2" fill="none"/>
  <text x="330" y="175" fill="#60a5fa" font-size="11">x² + y² = 4</text>
  <path d="M 80 320 Q 200 320 420 80" stroke="#818cf8" stroke-width="2" fill="none"/>
  <text x="400" y="70" fill="#818cf8" font-size="11">y² = 8x</text>
  <circle cx="320" cy="150" r="5" fill="#34d399"/>
  <text x="328" y="145" fill="#34d399" font-size="11">P(t)</text>
  <line x1="320" y1="150" x2="140" y2="100" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="100" y="95" fill="#fbbf24" font-size="11">tangent at P</text>
  <circle cx="160" cy="120" r="5" fill="#f87171"/>
  <text x="168" y="115" fill="#f87171" font-size="11">Q(±,²)</text>
  <line x1="160" y1="120" x2="220" y2="170" stroke="#34d399" stroke-width="1"/>
  <line x1="160" y1="120" x2="300" y2="200" stroke="#34d399" stroke-width="1"/>
  <circle cx="220" cy="170" r="4" fill="#34d399"/>
  <text x="225" y="168" fill="#34d399" font-size="10">A</text>
  <circle cx="300" cy="200" r="4" fill="#34d399"/>
  <text x="305" y="198" fill="#34d399" font-size="10">B</text>
  <line x1="220" y1="170" x2="300" y2="200" stroke="#a78bfa" stroke-width="2"/>
  <text x="240" y="210" fill="#a78bfa" font-size="10">chord AB</text>
  <text x="260" y="340" fill="#9ca3af" font-size="11" text-anchor="middle">Locus S: 2x + y² = 0  (left-opening parabola)</text>
</svg>
