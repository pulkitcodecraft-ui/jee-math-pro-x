<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" fill="none">
  <rect width="520" height="340" fill="#1a1a2e"/>
  <text x="260" y="22" fill="#a5b4fc" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Examples: quadrilateral inscribed in y² = 4ax</text>
  <path d="M 80 280 Q 260 280 440 80" stroke="#818cf8" stroke-width="2" fill="none"/>
  <text x="400" y="70" fill="#818cf8" font-size="11">y² = 4ax</text>
  <!-- rectangle vertices on parabola - cyclic -->
  <polygon points="200,200 320,200 320,280 200,280" fill="#34d399" fill-opacity="0.1" stroke="#34d399" stroke-width="1.5"/>
  <text x="230" y="250" fill="#34d399" font-size="10">cyclic rect. (A)</text>
  <!-- symmetric trapezium equal diagonals -->
  <polygon points="160,220 360,220 300,300 100,300" fill="#a78bfa" fill-opacity="0.1" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="170" y="310" fill="#a78bfa" font-size="10">equal diagonals (B)</text>
</svg>
