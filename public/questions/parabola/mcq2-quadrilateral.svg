<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 380" fill="none">
  <rect width="520" height="380" fill="#1a1a2e"/>
  <text x="260" y="24" fill="#a5b4fc" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Quadrilateral ABCD and region inside parabola yČ = 4x</text>
  <!-- axes -->
  <line x1="60" y1="300" x2="480" y2="300" stroke="#4b5563" stroke-width="1"/>
  <line x1="120" y1="40" x2="120" y2="320" stroke="#4b5563" stroke-width="1"/>
  <text x="485" y="305" fill="#9ca3af" font-size="11">x</text>
  <text x="115" y="35" fill="#9ca3af" font-size="11">y</text>
  <!-- parabola y^2=4x scaled: x = y^2/4, map y in [-3,3] to pixels -->
  <path d="M 120 300 Q 280 300 460 120 Q 280 60 120 300" stroke="#818cf8" stroke-width="2" fill="none"/>
  <text x="400" y="100" fill="#818cf8" font-size="11">yČ = 4x</text>
  <!-- A(-1,0) -> x=-1 is 90px left of origin at 120, so x=30 -->
  <circle cx="30" cy="300" r="5" fill="#f87171"/>
  <text x="18" y="318" fill="#f87171" font-size="12" font-weight="600">A</text>
  <!-- B(1,2) C(1,-2) D(3,0) scale: 1 unit x = 60px, 1 unit y = 40px from origin (120,300) -->
  <circle cx="180" cy="220" r="5" fill="#34d399"/>
  <text x="188" y="215" fill="#34d399" font-size="12" font-weight="600">B(1,2)</text>
  <circle cx="180" cy="380" r="5" fill="#34d399"/>
  <text x="188" y="375" fill="#34d399" font-size="11">C(1,-2)</text>
  <circle cx="300" cy="300" r="5" fill="#34d399"/>
  <text x="308" y="295" fill="#34d399" font-size="12" font-weight="600">D(3,0)</text>
  <!-- quadrilateral -->
  <polygon points="30,300 180,220 300,300 180,380" fill="#34d399" fill-opacity="0.08" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- region inside parabola highlight -->
  <path d="M 180 220 L 300 300 L 180 380 Z" fill="#a78bfa" fill-opacity="0.15"/>
  <text x="220" y="290" fill="#c4b5fd" font-size="10">łBDC  parabola</text>
  <text x="95" y="260" fill="#c4b5fd" font-size="10">) parabola near vertex</text>
  <text x="320" y="340" fill="#9ca3af" font-size="10">Area(ABCD) = 8</text>
  <text x="320" y="355" fill="#9ca3af" font-size="10">P = (4 + 8/3)/8 = 5/6</text>
</svg>
